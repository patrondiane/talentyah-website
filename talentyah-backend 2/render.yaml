services:
  - type: web
    name: talentyah-backend
    env: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: FRONTEND_URL
        sync: false   # Set this manually in Render dashboard
    disk:
      name: uploads
      mountPath: /opt/render/project/src/uploads
      sizeGB: 1
